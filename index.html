<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BACS Reconciliation</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0f0f0f; min-height: 100vh; }
    #root { min-height: 100vh; }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    @keyframes progressPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:#141414; }
    ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ── API ───────────────────────────────────────────────────────────────────────
async function callClaude(apiKey, messages, system, maxTokens = 4096) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      system,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content.filter(b => b.type === "text").map(b => b.text).join("");
}

function parseJSON(text) {
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ── Prompts ───────────────────────────────────────────────────────────────────
const SYS_BACS = `You are a financial data extraction assistant. Extract all payment entries from this BACS remittance advice or payment report PDF.
Return ONLY valid JSON, no markdown, no commentary.
Format: { "report_date": "DD/MM/YYYY", "total_value": 0.00, "entries": [ { "beneficiary": "...", "reference": "...", "amount": 0.00, "type": "credit|debit" } ] }
Amounts as positive numbers. type is "debit" only for credit notes/returns (negative adjustments).`;

const SYS_INVOICES = `You are a financial data extraction assistant. Extract all invoices and credit notes from this PDF (which may contain many).
Return ONLY valid JSON, no markdown, no commentary.
Format: { "invoices": [ { "beneficiary": "...", "invoice_number": "...", "invoice_date": "DD/MM/YYYY", "amount": 0.00, "doc_type": "Invoice|Credit Note", "reference": "..." } ] }
For credit notes amount should be negative. Amounts are gross/total including VAT.`;

const SYS_RECONCILE = `You are a financial reconciliation assistant. Reconcile BACS payment data against invoice data.
Group invoices by beneficiary, total them, and compare against BACS entries. Use fuzzy name matching.
Return ONLY valid JSON, no markdown.
Format: {
  "summary": { "total_bacs_entries": 0, "total_bacs_value": 0.00, "total_invoice_value": 0.00, "matched": 0, "discrepancies": 0, "unmatched_bacs": 0, "unmatched_invoices": 0 },
  "beneficiaries": [ { "name": "...", "bacs_amount": 0.00, "invoice_total": 0.00, "invoice_count": 0, "status": "match|discrepancy|missing_invoices|unmatched_payment", "difference": 0.00, "notes": "...", "invoices": [ { "invoice_number": "...", "date": "...", "amount": 0.00, "doc_type": "..." } ] } ]
}`;

// ── Formatters ────────────────────────────────────────────────────────────────
const fmt = n => n != null
  ? `£${Math.abs(Number(n)).toLocaleString("en-GB", { minimumFractionDigits:2, maximumFractionDigits:2 })}`
  : "—";
const fmtSigned = n => {
  if (n == null) return "—";
  const s = Number(n) < 0 ? "-" : "";
  return `${s}£${Math.abs(Number(n)).toLocaleString("en-GB", { minimumFractionDigits:2, maximumFractionDigits:2 })}`;
};

// ── Key Bar ───────────────────────────────────────────────────────────────────
function KeyBar({ apiKey, onChange }) {
  const valid = apiKey.trim().startsWith("sk-ant-");
  return (
    <div style={{
      background: "#0a0a0a",
      borderBottom: `1px solid ${valid ? "#3a7d5a44" : "#1e1e1e"}`,
      padding: "10px 48px",
      display: "flex", alignItems: "center", gap: 14,
      transition: "border-color 0.3s",
    }}>
      <span style={{
        fontFamily: "'DM Mono', monospace", fontSize: 10,
        letterSpacing: "0.12em", textTransform: "uppercase",
        color: "#444", flexShrink: 0,
      }}>API Key</span>
      <input
        type="password"
        placeholder="sk-ant-api03-..."
        value={apiKey}
        onChange={e => onChange(e.target.value)}
        style={{
          flex: 1, maxWidth: 420,
          background: "transparent",
          border: "none", outline: "none",
          fontFamily: "'DM Mono', monospace", fontSize: 12,
          color: valid ? "#e8e4dc" : "#555",
          letterSpacing: "0.04em",
        }}
      />
      <span style={{
        fontFamily: "'DM Mono', monospace", fontSize: 10,
        letterSpacing: "0.1em",
        color: valid ? "#3a7d5a" : "#2a2a2a",
        transition: "color 0.3s",
      }}>
        {valid ? "● READY" : "○ ENTER KEY"}
      </span>
    </div>
  );
}

// ── Upload Zone ───────────────────────────────────────────────────────────────
function UploadZone({ number, label, title, desc, file, onFile }) {
  const [drag, setDrag] = useState(false);
  const ref = useRef();
  const onDrop = useCallback(e => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f && f.type === "application/pdf") onFile(f);
  }, [onFile]);
  return (
    <div
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={onDrop}
      onClick={() => ref.current.click()}
      style={{
        border: `1px solid ${drag ? "#c8a96e" : file ? "#3a7d5a" : "#222"}`,
        borderRadius: 4, padding: "32px 24px", cursor: "pointer",
        background: drag ? "#171510" : file ? "#0f1a14" : "#141414",
        transition: "all 0.2s",
      }}
    >
      <input ref={ref} type="file" accept=".pdf" style={{ display:"none" }}
        onChange={e => e.target.files[0] && onFile(e.target.files[0])} />
      <div style={{
        fontFamily:"'DM Mono',monospace", fontSize:10,
        letterSpacing:"0.12em", textTransform:"uppercase",
        color:"#c8a96e", marginBottom:10,
      }}>{number} — {label}</div>
      <div style={{
        fontFamily:"'Instrument Serif',serif", fontSize:18,
        color:"#e8e4dc", marginBottom:6,
      }}>{title}</div>
      <div style={{ fontSize:13, color:"#555", lineHeight:1.5 }}>{desc}</div>
      {file && (
        <div style={{
          marginTop:14, fontFamily:"'DM Mono',monospace",
          fontSize:11, color:"#3a7d5a",
        }}>✓ {file.name}</div>
      )}
    </div>
  );
}

// ── Progress ──────────────────────────────────────────────────────────────────
function ProgressBar({ pct, label }) {
  return (
    <div style={{ marginBottom:32 }}>
      <div style={{
        display:"flex", justifyContent:"space-between",
        fontFamily:"'DM Mono',monospace", fontSize:11,
        color:"#888", letterSpacing:"0.06em", marginBottom:10,
      }}>
        <span style={{ animation:"progressPulse 1.5s ease infinite" }}>{label}</span>
        <span>{pct}%</span>
      </div>
      <div style={{ height:2, background:"#222", borderRadius:2, overflow:"hidden" }}>
        <div style={{
          height:"100%", background:"#c8a96e",
          width:`${pct}%`, transition:"width 0.5s ease",
        }}/>
      </div>
    </div>
  );
}

// ── Log Box ───────────────────────────────────────────────────────────────────
function LogBox({ logs }) {
  const ref = useRef();
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);
  if (!logs.length) return null;
  const colors = { ok:"#3a7d5a", warn:"#c8a96e", err:"#b85c5c", log:"#666" };
  return (
    <div ref={ref} style={{
      background:"#141414", border:"1px solid #1e1e1e", borderRadius:4,
      padding:"14px 18px", marginBottom:32,
      fontFamily:"'DM Mono',monospace", fontSize:11,
      lineHeight:1.9, maxHeight:140, overflowY:"auto",
    }}>
      {logs.map((l,i) => (
        <div key={i} style={{ color: colors[l.type] || colors.log }}>{l.msg}</div>
      ))}
    </div>
  );
}

// ── Stat Card ─────────────────────────────────────────────────────────────────
function StatCard({ label, value, tone }) {
  const tones = {
    neutral:{ border:"#1e1e1e",  bg:"#141414",  valColor:"#e8e4dc" },
    ok:     { border:"#3a7d5a33",bg:"#0f1a14",  valColor:"#4caf7d" },
    warn:   { border:"#b85c5c33",bg:"#170f0f",  valColor:"#e07070" },
    amber:  { border:"#c8a96e22",bg:"#171510",  valColor:"#c8a96e" },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <div style={{
      background:t.bg, border:`1px solid ${t.border}`,
      borderRadius:4, padding:"20px 18px",
    }}>
      <div style={{
        fontFamily:"'DM Mono',monospace", fontSize:10,
        letterSpacing:"0.1em", textTransform:"uppercase",
        color:"#444", marginBottom:8,
      }}>{label}</div>
      <div style={{
        fontFamily:"'Instrument Serif',serif",
        fontSize:28, color:t.valColor,
      }}>{value}</div>
    </div>
  );
}

// ── Results Table ─────────────────────────────────────────────────────────────
function ResultsTable({ beneficiaries }) {
  const [expanded, setExpanded] = useState(null);
  const pills = {
    match:             { bg:"#1a2e22", color:"#4caf7d", label:"Match" },
    discrepancy:       { bg:"#2e1a1a", color:"#e07070", label:"Discrepancy" },
    missing_invoices:  { bg:"#2a2000", color:"#c8a96e", label:"Missing Invoices" },
    unmatched_payment: { bg:"#1e1e2e", color:"#8888cc", label:"Unmatched" },
  };
  return (
    <div>
      {/* Header */}
      <div style={{
        display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr 60px 130px",
        gap:"0 8px", padding:"10px 14px",
        borderBottom:"1px solid #1e1e1e",
        fontFamily:"'DM Mono',monospace", fontSize:10,
        letterSpacing:"0.1em", textTransform:"uppercase", color:"#444",
      }}>
        <span>Beneficiary</span>
        <span style={{textAlign:"right"}}>BACS Amount</span>
        <span style={{textAlign:"right"}}>Invoice Total</span>
        <span style={{textAlign:"right"}}>Difference</span>
        <span style={{textAlign:"right"}}>Inv.</span>
        <span style={{textAlign:"right"}}>Status</span>
      </div>

      {beneficiaries?.map((b, i) => {
        const pill = pills[b.status] || pills.unmatched_payment;
        const hasDisc = b.difference != null && Math.abs(b.difference) > 0.005;
        const isOpen = expanded === i;
        return (
          <div key={i} style={{
            borderBottom:"1px solid #181818",
            animation:"fadeSlideIn 0.2s ease both",
            animationDelay:`${i*25}ms`,
          }}>
            <div
              onClick={() => b.invoices?.length && setExpanded(isOpen ? null : i)}
              style={{
                display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr 60px 130px",
                gap:"0 8px", padding:"13px 14px",
                cursor: b.invoices?.length ? "pointer" : "default",
                transition:"background 0.15s",
              }}
              onMouseEnter={e => e.currentTarget.style.background="#161616"}
              onMouseLeave={e => e.currentTarget.style.background="transparent"}
            >
              <div>
                <span style={{ fontSize:13, color:"#e8e4dc" }}>{b.name}</span>
                {b.invoices?.length > 0 && (
                  <span style={{
                    marginLeft:8, fontFamily:"'DM Mono',monospace",
                    fontSize:10, color:"#444",
                  }}>{isOpen ? "▲" : "▼"}</span>
                )}
              </div>
              <div style={{ textAlign:"right", fontFamily:"'DM Mono',monospace", fontSize:12, color:"#e8e4dc" }}>
                {fmt(b.bacs_amount)}
              </div>
              <div style={{ textAlign:"right", fontFamily:"'DM Mono',monospace", fontSize:12, color:"#e8e4dc" }}>
                {fmt(b.invoice_total)}
              </div>
              <div style={{ textAlign:"right", fontFamily:"'DM Mono',monospace", fontSize:12 }}>
                {hasDisc
                  ? <span style={{color:"#b85c5c"}}>{fmt(b.difference)}</span>
                  : <span style={{color:"#3a7d5a"}}>—</span>}
              </div>
              <div style={{ textAlign:"right", fontFamily:"'DM Mono',monospace", fontSize:12, color:"#555" }}>
                {b.invoice_count ?? "—"}
              </div>
              <div style={{ textAlign:"right" }}>
                <span style={{
                  display:"inline-block",
                  background:pill.bg, color:pill.color,
                  fontFamily:"'DM Mono',monospace", fontSize:10,
                  letterSpacing:"0.06em", textTransform:"uppercase",
                  padding:"3px 8px", borderRadius:2,
                }}>{pill.label}</span>
              </div>
            </div>

            {/* Invoice breakdown */}
            {isOpen && b.invoices?.length > 0 && (
              <div style={{
                background:"#0f0f0f", borderTop:"1px solid #1a1a1a",
                padding:"12px 14px 16px 28px",
              }}>
                <div style={{
                  fontFamily:"'DM Mono',monospace", fontSize:10,
                  letterSpacing:"0.1em", textTransform:"uppercase",
                  color:"#444", marginBottom:10,
                }}>Invoice Breakdown</div>
                {b.invoices.map((inv, j) => (
                  <div key={j} style={{
                    display:"flex", justifyContent:"space-between",
                    alignItems:"center", padding:"7px 0",
                    borderBottom: j < b.invoices.length-1 ? "1px solid #181818" : "none",
                  }}>
                    <div>
                      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:"#888" }}>
                        {inv.invoice_number || "—"}
                      </span>
                      {inv.doc_type === "Credit Note" && (
                        <span style={{
                          marginLeft:8, fontFamily:"'DM Mono',monospace", fontSize:9,
                          color:"#06b6d4", background:"#0e4a5a",
                          padding:"1px 5px", borderRadius:2,
                          textTransform:"uppercase", letterSpacing:"0.06em",
                        }}>CR</span>
                      )}
                      {inv.date && (
                        <span style={{ marginLeft:10, fontSize:11, color:"#444" }}>{inv.date}</span>
                      )}
                    </div>
                    <span style={{
                      fontFamily:"'DM Mono',monospace", fontSize:12,
                      color: inv.amount < 0 ? "#06b6d4" : "#e8e4dc",
                    }}>{fmtSigned(inv.amount)}</span>
                  </div>
                ))}
                {b.notes && (
                  <div style={{
                    marginTop:10, fontFamily:"'DM Mono',monospace",
                    fontSize:11, color:"#b85c5c",
                  }}>{b.notes}</div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey]         = useState("");
  const [bacsFile, setBacsFile]     = useState(null);
  const [invoiceFile, setInvoiceFile] = useState(null);
  const [stage, setStage]           = useState("idle");
  const [logs, setLogs]             = useState([]);
  const [progress, setProgress]     = useState(0);
  const [progLabel, setProgLabel]   = useState("");
  const [result, setResult]         = useState(null);
  const [error, setError]           = useState("");

  const hasKey  = apiKey.trim().startsWith("sk-ant-");
  const canRun  = hasKey && bacsFile && invoiceFile && stage !== "running";

  const addLog = (msg, type = "log") => setLogs(l => [...l, { msg, type }]);

  const run = useCallback(async () => {
    if (!canRun) return;
    setStage("running"); setLogs([]); setProgress(0); setResult(null); setError("");

    try {
      addLog("Reading BACS report…");
      setProgLabel("Extracting BACS data"); setProgress(8);
      const bacsB64 = await fileToBase64(bacsFile);
      const bacsText = await callClaude(apiKey, [{
        role:"user",
        content:[
          { type:"document", source:{ type:"base64", media_type:"application/pdf", data:bacsB64 } },
          { type:"text", text:"Extract all BACS payment entries from this report." },
        ],
      }], SYS_BACS);
      const bacsData = parseJSON(bacsText);
      addLog(`✓ BACS: ${bacsData.entries?.length ?? 0} entries found`, "ok");
      setProgress(35);

      addLog("Reading invoices PDF…");
      setProgLabel("Extracting invoice data");
      const invB64 = await fileToBase64(invoiceFile);
      const invText = await callClaude(apiKey, [{
        role:"user",
        content:[
          { type:"document", source:{ type:"base64", media_type:"application/pdf", data:invB64 } },
          { type:"text", text:"Extract all invoices from this document. There may be multiple invoices." },
        ],
      }], SYS_INVOICES);
      const invData = parseJSON(invText);
      addLog(`✓ Invoices: ${invData.invoices?.length ?? 0} invoices/credit notes extracted`, "ok");
      setProgress(65);

      addLog("Reconciling…");
      setProgLabel("Running reconciliation");
      const reconText = await callClaude(apiKey, [{
        role:"user",
        content:`Reconcile these.\n\nBACS DATA:\n${JSON.stringify(bacsData)}\n\nINVOICE DATA:\n${JSON.stringify(invData)}`,
      }], SYS_RECONCILE);
      const recon = parseJSON(reconText);

      const disc = recon.summary?.discrepancies || 0;
      const unm  = (recon.summary?.unmatched_bacs || 0) + (recon.summary?.unmatched_invoices || 0);
      addLog("✓ Reconciliation complete", "ok");
      if (disc > 0 || unm > 0) {
        addLog(`⚠ ${disc} discrepanc${disc===1?"y":"ies"}, ${unm} unmatched item${unm!==1?"s":""}`, "warn");
      } else {
        addLog("✓ All entries reconcile", "ok");
      }

      setProgress(100); setProgLabel("Complete");
      setResult(recon); setStage("done");
    } catch(e) {
      addLog(`Error: ${e.message}`, "err");
      setError(e.message); setStage("error");
    }
  }, [canRun, apiKey, bacsFile, invoiceFile]);

  const reset = () => {
    setStage("idle"); setLogs([]); setProgress(0);
    setResult(null); setError("");
    setBacsFile(null); setInvoiceFile(null);
    // key is intentionally kept so user doesn't have to re-enter mid-session
  };

  const exportCSV = () => {
    if (!result) return;
    const rows = [
      ["Beneficiary","BACS Amount (£)","Invoice Total (£)","Difference (£)","Invoice Count","Status","Notes"],
      ...result.beneficiaries.map(b => [
        b.name,
        b.bacs_amount?.toFixed(2) ?? "",
        b.invoice_total?.toFixed(2) ?? "",
        b.difference?.toFixed(2) ?? "",
        b.invoice_count ?? "",
        b.status,
        b.notes ?? "",
      ])
    ];
    const csv = rows.map(r => r.map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "bacs-reconciliation.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const disc    = result?.summary?.discrepancies || 0;
  const total   = result?.summary?.total_bacs_entries || 0;
  const matched = result?.summary?.matched || 0;

  return (
    <div style={{
      minHeight:"100vh", background:"#0f0f0f",
      color:"#e8e4dc", fontFamily:"'DM Sans',sans-serif", fontWeight:300,
    }}>

      {/* Key bar — always visible at top */}
      <KeyBar apiKey={apiKey} onChange={setApiKey} />

      {/* Header */}
      <header style={{
        borderBottom:"1px solid #1e1e1e",
        padding:"24px 48px",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        background:"#0f0f0f",
      }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:16 }}>
          <span style={{
            fontFamily:"'Instrument Serif',serif", fontSize:22,
            letterSpacing:"-0.01em", color:"#e8e4dc",
          }}>BACS Reconciliation</span>
          <span style={{
            fontFamily:"'DM Mono',monospace", fontSize:11,
            color:"#333", letterSpacing:"0.08em", textTransform:"uppercase",
          }}>AI-Powered · PDF Analysis</span>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          {result && (
            <button onClick={exportCSV} style={{
              padding:"7px 16px", background:"transparent",
              color:"#c8a96e", border:"1px solid #c8a96e44",
              borderRadius:4, fontFamily:"'DM Mono',monospace",
              fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase",
              cursor:"pointer", transition:"background 0.2s",
            }}
            onMouseEnter={e => e.currentTarget.style.background="#c8a96e11"}
            onMouseLeave={e => e.currentTarget.style.background="transparent"}
            >⬇ Export CSV</button>
          )}
          {stage !== "idle" && (
            <button onClick={reset} style={{
              padding:"7px 14px", background:"transparent",
              color:"#555", border:"1px solid #2a2a2a",
              borderRadius:4, fontFamily:"'DM Mono',monospace",
              fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase",
              cursor:"pointer",
            }}>↺ New Run</button>
          )}
        </div>
      </header>

      {/* Main */}
      <main style={{ maxWidth:960, margin:"0 auto", padding:"48px 48px 80px" }}>

        {(stage === "idle" || stage === "error") && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:32 }}>
              <UploadZone
                number="01" label="BACS Report" title="Payment Report"
                desc="Your BACS output file listing all payment entries"
                file={bacsFile} onFile={setBacsFile}
              />
              <UploadZone
                number="02" label="Invoices" title="Invoice Bundle"
                desc="All supplier invoices merged into a single PDF"
                file={invoiceFile} onFile={setInvoiceFile}
              />
            </div>

            <button
              onClick={run}
              disabled={!canRun}
              style={{
                width:"100%", padding:18,
                background: canRun ? "#c8a96e" : "#1a1a1a",
                color: canRun ? "#0f0f0f" : "#333",
                border:"none", borderRadius:4,
                fontFamily:"'DM Mono',monospace", fontSize:12,
                letterSpacing:"0.1em", textTransform:"uppercase",
                fontWeight:500, cursor: canRun ? "pointer" : "not-allowed",
                transition:"all 0.2s", marginBottom:24,
              }}
            >
              {!hasKey
                ? "Enter API Key Above to Continue"
                : !bacsFile || !invoiceFile
                  ? "Upload Both PDFs to Continue"
                  : "Run Reconciliation"}
            </button>
          </>
        )}

        {stage === "running" && <ProgressBar pct={progress} label={progLabel} />}
        <LogBox logs={logs} />

        {stage === "error" && error && (
          <div style={{
            background:"#170f0f", border:"1px solid #b85c5c44",
            borderRadius:4, padding:"20px 24px",
            fontSize:13, color:"#b85c5c", lineHeight:1.6, marginBottom:24,
          }}>
            <strong>Error:</strong> {error}
            <br/><br/>
            Check that both PDFs are digital-native (not scanned) and not password-protected.
            If the error mentions authentication, check your API key is correct.
          </div>
        )}

        {result && stage === "done" && (
          <div style={{ animation:"fadeSlideIn 0.3s ease" }}>
            <div style={{
              display:"flex", justifyContent:"space-between",
              alignItems:"baseline", marginBottom:24,
            }}>
              <span style={{
                fontFamily:"'Instrument Serif',serif", fontSize:26, color:"#e8e4dc",
              }}>Reconciliation Report</span>
              <span style={{
                fontFamily:"'DM Mono',monospace", fontSize:11, color:"#444",
              }}>{result.beneficiaries?.length} beneficiar{result.beneficiaries?.length===1?"y":"ies"}</span>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:16, marginBottom:32 }}>
              <StatCard label="BACS Total"    value={fmt(result.summary?.total_bacs_value)}    tone="neutral"/>
              <StatCard label="Invoice Total" value={fmt(result.summary?.total_invoice_value)} tone="neutral"/>
              <StatCard label="Discrepancies" value={disc}           tone={disc>0?"warn":"ok"}/>
              <StatCard label="Matched"       value={`${matched}/${total}`} tone={matched===total?"ok":"amber"}/>
            </div>

            <hr style={{ border:"none", borderTop:"1px solid #1e1e1e", margin:"0 0 24px" }}/>
            <div style={{
              fontFamily:"'DM Mono',monospace", fontSize:10,
              letterSpacing:"0.14em", textTransform:"uppercase",
              color:"#444", marginBottom:16,
            }}>Beneficiary Breakdown</div>

            <ResultsTable beneficiaries={result.beneficiaries} />
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
